<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>TravelKit - 2026 Summer Thai Trip</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', system-ui, sans-serif; 
            -webkit-user-select: none; 
            background-color: #f8fafc; 
            min-height: 100dvh; 
            overflow-x: hidden;
            font-size: 16px; 
        }
        
        .bg-gradient-rainbow { 
            background: linear-gradient(120deg, #22d3ee, #818cf8, #f472b6, #fb923c, #facc15, #4ade80);
            background-size: 200% 200%;
            animation: rainbowAnimation 5s ease infinite;
        }
        @keyframes rainbowAnimation { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
        
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .btn-pulse { animation: pulse-soft 2s infinite; }

        .card { box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.05); border: 1px solid rgba(0, 0, 0, 0.04); }
        .page { display: none; width: 100%; }
        .page.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .nav-item { transition: all 0.2s; cursor: pointer; color: #94a3b8; }
        .nav-item.active { color: #f472b6; font-weight: 900; } 
        
        .calendar-scroll-container { 
            display: flex; 
            overflow-x: auto; 
            white-space: nowrap; 
            -webkit-overflow-scrolling: touch; 
            gap: 1rem; 
            padding: 15px 10px 1.2rem 10px; 
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .date-chip { 
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); 
            flex-shrink: 0; 
            width: 72px; 
            height: 72px; 
            border-radius: 50%; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .date-chip.active { 
            background-color: #6366f1; 
            color: white; 
            transform: translateY(-8px); 
            box-shadow: 0 12px 20px -5px rgba(99, 102, 241, 0.5); 
        } 
        
        .itinerary-container { position: relative; padding-left: 18px; min-height: 200px; }
        .itinerary-line { position: absolute; left: 6px; top: 20px; bottom: 20px; width: 3px; background: #e2e8f0; border-radius: 10px; overflow: hidden; }
        .itinerary-line::after { content: ""; position: absolute; top: -100px; left: 0; width: 100%; height: 100px; background: linear-gradient(to bottom, transparent, #6366f1, transparent); animation: flowLine 3s infinite linear; }
        @keyframes flowLine { 0% { top: -100px; } 100% { top: 100%; } }

        .itin-card { position: relative; background: white; border-radius: 2rem; padding: 1.5rem; margin-bottom: 1.25rem; transition: all 0.3s ease; width: 100%; }
        .itin-card::before { content: ""; position: absolute; left: -19px; top: 32px; width: 10px; height: 10px; background: white; border: 2.5px solid #6366f1; border-radius: 50%; z-index: 10; }
        .is-pre-trip .itin-card::before { display: none; }
        .is-pre-trip .itinerary-line { display: none; }
        .is-pre-trip .itinerary-container { padding-left: 0; }

        .completed-text { text-decoration: line-through; opacity: 0.5; }
        .time-bubble { background: #6366f1; color: white; font-weight: 900; font-style: italic; padding: 4px 12px; border-radius: 10px; font-size: 11px; }

        .tick-box { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #e2e8f0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
        .tick-box.checked { background: #10b981; border-color: #10b981; }
        
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    </style>
</head>
<body class="pb-32 overflow-x-hidden">

    <div class="bg-gradient-rainbow text-white sticky top-0 z-50 shadow-lg w-full">
        <div class="max-w-2xl mx-auto px-5 py-5 flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter text-white">2026 Summer Thai Trip</h1>
                <p class="text-[10px] tracking-[0.2em] opacity-90 uppercase font-bold text-white">24/6 – 01/7 • 泰國之行</p>
            </div>
            <button onclick="window.showUpdates()" class="bg-white/20 backdrop-blur-md w-11 h-11 rounded-full flex items-center justify-center border border-white/30 active:scale-90 relative">
                <i class="fa-solid fa-bell text-sm text-white"></i>
                <span id="update-dot" class="hidden absolute top-2 right-2 w-2.5 h-2.5 bg-rose-500 rounded-full border border-white"></span>
            </button>
        </div>
    </div>

    <div class="max-w-2xl mx-auto px-4 pt-6 w-full">
        
        <div id="page-home" class="page active">
            <div class="bg-white rounded-[2.5rem] p-9 card text-center border-t-4 border-t-indigo-400 relative overflow-hidden">
                <div class="absolute top-2 right-6 text-5xl opacity-20 animate-float">☁️</div>
                <div class="absolute top-12 left-6 text-4xl opacity-20 animate-float" style="animation-delay: 1s;">☁️</div>
                
                <div class="text-7xl mb-4 animate-float">☀️</div>
                <h2 class="text-3xl font-black italic text-gray-800">同陽光玩遊戲！</h2>
                
                <div class="mt-6 flex flex-wrap justify-center gap-2.5" id="home-members">
                    <span onclick="window.spawnEmoji(event)" class="px-4 py-1.5 bg-indigo-50 text-indigo-500 rounded-full text-[11px] font-black uppercase tracking-wider cursor-pointer">Valerie</span>
                    <span onclick="window.spawnEmoji(event)" class="px-4 py-1.5 bg-pink-50 text-pink-500 rounded-full text-[11px] font-black uppercase tracking-wider cursor-pointer">Victoria</span>
                    <span onclick="window.spawnEmoji(event)" class="px-4 py-1.5 bg-emerald-50 text-emerald-500 rounded-full text-[11px] font-black uppercase tracking-wider cursor-pointer">Alston</span>
                    <span onclick="window.spawnEmoji(event)" class="px-4 py-1.5 bg-amber-50 text-amber-500 rounded-full text-[11px] font-black uppercase tracking-wider cursor-pointer">Steven</span>
                    <span onclick="window.spawnEmoji(event)" class="px-4 py-1.5 bg-blue-50 text-blue-500 rounded-full text-[11px] font-black uppercase tracking-wider cursor-pointer">Edward</span>
                </div>

                <div class="grid grid-cols-1 gap-4 mt-12 mb-8">
                    <button onclick="window.quickAddExpense()" class="btn-pulse w-full bg-emerald-400 text-white p-7 rounded-[2rem] flex items-center justify-between shadow-lg">
                        <div class="flex items-center gap-4"><div class="bg-white/20 w-11 h-11 rounded-xl flex items-center justify-center"><i class="fa-solid fa-receipt text-xl"></i></div><span class="font-black italic uppercase text-base">新增開支項目</span></div>
                        <i class="fa-solid fa-chevron-right opacity-50 text-sm"></i>
                    </button>
                    <button onclick="window.quickAddPlan()" class="btn-pulse w-full bg-indigo-500 text-white p-7 rounded-[2rem] flex items-center justify-between shadow-lg">
                        <div class="flex items-center gap-4"><div class="bg-white/20 w-11 h-11 rounded-xl flex items-center justify-center"><i class="fa-solid fa-map-pin text-xl"></i></div><span class="font-black italic uppercase text-base">更新行程規劃</span></div>
                        <i class="fa-solid fa-chevron-right opacity-50 text-sm"></i>
                    </button>
                </div>
                <div class="opacity-20">
                    <button onclick="window.factoryReset()" class="text-[10px] font-black text-slate-400 uppercase tracking-widest border border-slate-200 px-4 py-2 rounded-full">Reset System</button>
                </div>
            </div>
        </div>

        <div id="page-itinerary" class="page">
            <div class="calendar-scroll-container no-scrollbar" id="calendar-strip"></div>
            <div class="flex justify-between items-center mb-6 px-1">
                <h2 class="text-2xl font-black italic text-gray-800" id="current-view-date">Pre-trip 備忘</h2>
                <button onclick="window.showAddItineraryModal()" class="bg-indigo-500 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg"><i class="fa-solid fa-plus text-lg"></i></button>
            </div>
            <div class="itinerary-container" id="itin-wrapper">
                <div class="itinerary-line" id="timeline-line"></div>
                <div id="itinerary-list" class="space-y-4"></div>
            </div>
        </div>

        <div id="page-expenses" class="page">
            <div class="flex justify-between items-center mb-5 px-1">
                <div class="flex gap-2">
                    <button onclick="window.showAddExpenseModal()" class="bg-emerald-400 text-white px-5 py-3 rounded-2xl text-[11px] font-black italic shadow-md">➕ 記帳</button>
                    <button onclick="window.showPaybackModal()" class="bg-indigo-100 text-indigo-600 px-5 py-3 rounded-2xl text-[11px] font-black italic">💸 轉帳</button>
                </div>
                <button onclick="window.resetExpenseData()" class="bg-rose-50 text-rose-500 px-4 py-3 rounded-2xl text-[11px] font-black italic border border-rose-100">🗑️ 清空</button>
            </div>
            
            <div class="bg-gradient-to-br from-rose-400 to-pink-500 text-white rounded-[2.2rem] p-7 mb-6 shadow-xl italic">
                <div class="flex justify-between items-end">
                    <div>
                        <span class="text-white/70 text-[10px] font-black tracking-widest uppercase">總計 THB</span>
                        <div class="flex items-baseline gap-1 mt-1">
                            <span class="text-2xl font-black">฿</span><span id="total-spent-thb" class="text-4xl font-black">0</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-white/70 text-[10px] font-black tracking-widest uppercase">總計 HKD</span>
                        <div class="flex items-baseline gap-1 mt-1 justify-end">
                            <span class="text-lg font-black">$</span><span id="total-spent-hkd" class="text-2xl font-black">0</span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="expense-list" class="space-y-4 mb-8"></div>
            <div id="settlement-list" class="bg-white rounded-[2rem] p-6 card space-y-4 border-t-4 border-t-emerald-400"></div>
        </div>

        <div id="page-map" class="page">
            <div class="relative mb-4">
                <input id="map-search" type="text" placeholder="想去邊度？" class="w-full px-6 py-4 pr-16 rounded-2xl border-none shadow-md font-bold outline-none focus:ring-2 ring-indigo-400 text-base">
                <button onclick="window.searchAndShowDirections()" class="absolute right-2 top-1/2 -translate-y-1/2 bg-indigo-500 text-white w-12 h-12 rounded-xl active:scale-95 transition-transform flex items-center justify-center">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
            <a href="https://maps.app.goo.gl/5tGkwrr5Ejc9s4yQA" target="_blank" class="w-full bg-slate-900 text-white p-5 rounded-2xl flex items-center justify-center gap-3 shadow-lg mb-6">
                <span class="text-xl">😋</span>
                <span class="text-sm font-black italic uppercase tracking-wider">開啟美食清單 (Google Maps)</span>
            </a>
            <div id="map-container" class="h-[50vh] bg-white rounded-[2.5rem] card overflow-hidden flex items-center justify-center text-slate-300 italic text-base p-4">
                <p>請輸入目的地搜尋地圖</p>
            </div>
        </div>
        
        <div id="page-documents" class="page">
            <div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-black italic">共享文件</h2><button onclick="window.triggerUpload()" class="bg-slate-900 text-white px-5 py-3 rounded-2xl text-[11px] font-black italic">上傳</button></div>
            <div id="documents-list" class="space-y-4"></div>
            <input type="file" id="file-input" class="hidden" onchange="window.handleFileSelect(event)">
        </div>
    </div>

    <div class="fixed bottom-6 left-4 right-4 bg-white/95 backdrop-blur-xl border border-white/20 rounded-[2.5rem] max-w-2xl mx-auto z-50 shadow-2xl">
        <div class="grid grid-cols-5 text-center py-5">
            <div onclick="window.navigateTo('home')" class="nav-item active flex flex-col items-center"><i class="fa-solid fa-house text-lg"></i><span class="text-[9px] mt-1.5 font-black uppercase">Home</span></div>
            <div onclick="window.navigateTo('itinerary')" class="nav-item flex flex-col items-center"><i class="fa-solid fa-route text-lg"></i><span class="text-[9px] mt-1.5 font-black uppercase">Plan</span></div>
            <div onclick="window.navigateTo('expenses')" class="nav-item flex flex-col items-center"><i class="fa-solid fa-receipt text-lg"></i><span class="text-[9px] mt-1.5 font-black uppercase">Spend</span></div>
            <div onclick="window.navigateTo('map')" class="nav-item flex flex-col items-center"><i class="fa-solid fa-map text-lg"></i><span class="text-[9px] mt-1.5 font-black uppercase">Map</span></div>
            <div onclick="window.navigateTo('documents')" class="nav-item flex flex-col items-center"><i class="fa-solid fa-folder text-lg"></i><span class="text-[9px] mt-1.5 font-black uppercase">Docs</span></div>
        </div>
    </div>

    <div id="modal-updates" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999] px-6">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 overflow-y-auto max-h-[80vh]">
            <h3 class="text-xl font-black mb-5 italic">最新動態 🔔</h3>
            <div id="update-log-container" class="space-y-4 mb-6"></div>
            <button onclick="window.hideModals(); document.getElementById('update-dot').classList.add('hidden')" class="w-full py-4 bg-gray-900 text-white rounded-2xl font-black italic text-base">關閉</button>
        </div>
    </div>

    <div id="modal-payback" class="hidden fixed inset-0 bg-black/80 flex items-end z-[9999]">
        <div class="bg-white w-full max-w-2xl mx-auto rounded-t-[2.5rem] p-9">
            <h3 class="text-xl font-black mb-6 italic text-indigo-500 uppercase">費用轉帳 / 結算</h3>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div><label class="text-[11px] font-black text-slate-400 mb-1.5 block uppercase">邊個轉帳？</label><select id="payback-from" class="w-full p-4 rounded-2xl bg-slate-100 font-bold border-none outline-none text-base"></select></div>
                <div><label class="text-[11px] font-black text-slate-400 mb-1.5 block uppercase">轉俾邊個？</label><select id="payback-to" class="w-full p-4 rounded-2xl bg-slate-100 font-bold border-none outline-none text-base"></select></div>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <input id="payback-amount" type="number" placeholder="金額" class="p-4 rounded-2xl bg-slate-100 font-bold border-none outline-none text-base">
                <select id="payback-currency" class="p-4 rounded-2xl bg-slate-100 font-bold border-none outline-none text-base"><option value="THB">฿ THB</option><option value="HKD">$ HKD</option></select>
            </div>
            <div class="flex gap-4">
                <button onclick="window.hideModals()" class="flex-1 py-4 text-slate-400 font-bold italic text-base">✖️ 取消</button>
                <button onclick="window.savePayback()" class="flex-[2] py-4 bg-indigo-500 text-white rounded-2xl font-black italic shadow-lg text-base">確認轉帳</button>
            </div>
        </div>
    </div>

    <div id="modal-itinerary" class="hidden fixed inset-0 bg-black/80 flex items-end z-[9999]">
        <div class="bg-white w-full max-w-2xl mx-auto rounded-t-[2.5rem] p-9 overflow-y-auto max-h-[92vh]">
            <h3 id="modal-itinerary-title" class="text-xl font-black italic mb-6">更新行程事項</h3>
            <select id="act-date" onchange="window.toggleTimeFields()" class="w-full mb-4 p-4 rounded-2xl bg-slate-100 font-bold border-none outline-none text-base">
                <option value="Pre">Pre-trip 備忘</option><option value="24">24/6</option><option value="25">25/6</option><option value="26">26/6</option><option value="27">27/6</option><option value="28">28/6</option><option value="29">29/6</option><option value="30">30/6</option><option value="01">01/7</option>
            </select>
            <div id="time-selector" class="flex gap-3 items-center mb-4">
                <select id="act-hour" class="flex-1 p-4 rounded-2xl bg-slate-100 font-black text-center border-none outline-none text-base"></select>
                <span class="font-black text-indigo-500">:</span>
                <select id="act-min" class="flex-1 p-4 rounded-2xl bg-slate-100 font-black text-center border-none outline-none text-base"></select>
            </div>
            <input id="act-title" type="text" placeholder="事項名稱" class="w-full mb-4 p-4 rounded-2xl bg-slate-100 font-bold border-none outline-none text-base">
            <textarea id="act-remark" placeholder="備註..." class="w-full p-4 rounded-2xl bg-slate-100 h-32 font-bold border-none outline-none mb-8 text-base"></textarea>
            <div class="flex gap-4">
                <button onclick="window.hideModals()" class="flex-1 py-4 text-slate-400 font-bold italic text-base">✖️ 取消</button>
                <button id="delete-btn" onclick="window.deleteItinerary()" class="hidden flex-1 py-4 text-rose-500 font-bold italic text-base">🗑️ 刪除</button>
                <button onclick="window.saveItinerary()" class="flex-[2] py-4 bg-indigo-500 text-white rounded-2xl font-black italic shadow-lg text-base">儲存</button>
            </div>
        </div>
    </div>

    <div id="modal-expense" class="hidden fixed inset-0 bg-black/80 flex items-end z-[9999]">
        <div class="bg-white w-full max-w-2xl mx-auto rounded-t-[2.5rem] p-9">
            <h3 class="text-xl font-black mb-6 italic text-emerald-400 uppercase">新增開支</h3>
            <input id="exp-desc" type="text" placeholder="項目名稱" class="w-full p-5 rounded-2xl bg-slate-100 mb-4 font-bold border-none outline-none text-base">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <input id="exp-amount" type="number" placeholder="金額" class="p-5 rounded-2xl bg-slate-100 font-bold border-none outline-none text-base">
                <select id="exp-currency" class="p-5 rounded-2xl bg-slate-100 font-bold border-none outline-none text-base"><option value="THB">฿ THB</option><option value="HKD">$ HKD</option></select>
            </div>
            <select id="exp-paidby" class="w-full p-5 rounded-2xl bg-slate-100 mb-6 font-bold border-none outline-none text-base"></select>
            <div id="split-members" class="flex flex-wrap gap-2.5 mb-8"></div>
            <div class="flex gap-4">
                <button onclick="window.hideModals()" class="flex-1 py-4 text-slate-400 font-bold italic text-base">✖️ 取消</button>
                <button onclick="window.saveExpense()" class="flex-[2] py-4 bg-emerald-400 text-white rounded-2xl font-black italic shadow-lg text-base">確認記帳</button>
            </div>
        </div>
    </div>

    <script>
        const groupMembers = ["Valerie", "Victoria", "Alston", "Steven", "Edward"];
        let demoItinerary = [];
        let demoExpenses = [];
        let demoDocs = [];
        let selectedDate = "Pre";
        let editingId = null;

        const SUPABASE_URL = 'https://tyvvmxmdeaugjaxhqkol.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5dnZteG1kZWF1Z2pheGhxa29sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NjI4NTMsImV4cCI6MjA5MjQzODg1M30.WOibTjOXIgd-Zpbc9fXuUo_IAUuFvy2cdFn7ohrTAIQ';
        
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        client.channel('realtime_sync')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'itinerary' }, () => { fetchData(); showNotification(); })
            .on('postgres_changes', { event: '*', schema: 'public', table: 'expenses' }, () => { fetchData(); showNotification(); })
            .on('postgres_changes', { event: '*', schema: 'public', table: 'documents' }, () => { fetchData(); showNotification(); })
            .subscribe();

        async function fetchData() {
            const { data: itin } = await client.from('itinerary').select('*');
            const { data: exp } = await client.from('expenses').select('*').order('created_at', { ascending: false });
            const { data: docs } = await client.from('documents').select('*');
            if (itin) demoItinerary = itin;
            if (exp) demoExpenses = exp;
            if (docs) demoDocs = docs;
            renderItinerary(); renderExpenses(); renderDocs(); updateBellLog();
        }

        function showNotification() { document.getElementById('update-dot').classList.remove('hidden'); }

        window.onload = () => { initDateBar(); initTimeSelectors(); fetchData(); window.navigateTo('home'); };

        window.spawnEmoji = (e) => {
            const emojis = ["✈️", "🌴", "🥥", "฿", "🍹", "🍍", "🐘"];
            const emoji = document.createElement("div");
            emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            emoji.style.position = "absolute"; emoji.style.left = e.pageX + "px"; emoji.style.top = e.pageY + "px";
            emoji.style.fontSize = "30px"; emoji.style.pointerEvents = "none"; emoji.style.zIndex = "1000";
            document.body.appendChild(emoji);
            let pos = 0;
            let id = setInterval(() => {
                if (pos === 50) { clearInterval(id); emoji.remove(); }
                else { pos++; emoji.style.top = (e.pageY - pos) + "px"; emoji.style.opacity = (1 - pos/50); }
            }, 10);
        };

        function initDateBar() {
            const dates = ["Pre", "24", "25", "26", "27", "28", "29", "30", "01"];
            document.getElementById('calendar-strip').innerHTML = dates.map(d => `
                <div onclick="window.filterDate('${d}')" id="date-${d}" class="date-chip bg-white card cursor-pointer ${d === selectedDate ? 'active' : ''}">
                    <span class="text-[9px] font-black opacity-40 uppercase text-center">${d === 'Pre' ? 'List' : (d === '01' ? 'JULY' : 'JUNE')}</span>
                    <span class="text-xl font-black italic">${d === 'Pre' ? '備忘' : d}</span>
                </div>`).join('');
        }

        function initTimeSelectors() {
            const h = document.getElementById('act-hour'); const m = document.getElementById('act-min');
            h.innerHTML = Array.from({length: 24}, (_, i) => `<option value="${i.toString().padStart(2,'0')}">${i.toString().padStart(2,'0')}</option>`).join('');
            m.innerHTML = Array.from({length: 12}, (_, i) => `<option value="${(i*5).toString().padStart(2,'0')}">${(i*5).toString().padStart(2,'0')}</option>`).join('');
        }

        window.navigateTo = (page) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${page}`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            const idx = ['home','itinerary','expenses','map','documents'].indexOf(page);
            if(idx >= 0) document.querySelectorAll('.nav-item')[idx].classList.add('active');
            window.scrollTo(0,0);
        };

        window.filterDate = (d) => {
            selectedDate = d;
            document.querySelectorAll('.date-chip').forEach(el => el.classList.remove('active'));
            const target = document.getElementById(`date-${d}`); if(target) target.classList.add('active');
            document.getElementById('current-view-date').textContent = d === 'Pre' ? 'Pre-trip 備忘' : (d === '01' ? `7月1日 行程` : `6月${d}日 行程`);
            renderItinerary();
        };

        function renderItinerary() {
            const container = document.getElementById('itinerary-list');
            const wrapper = document.getElementById('itin-wrapper');
            const isPre = selectedDate === 'Pre';
            let f = demoItinerary.filter(i => i.date === selectedDate);
            if(isPre) { f.sort((a,b) => (a.checked === b.checked) ? 0 : a.checked ? 1 : -1); wrapper.classList.add('is-pre-trip'); } 
            else { f.sort((a,b) => (a.time || "").localeCompare(b.time || "")); wrapper.classList.remove('is-pre-trip'); }
            if(f.length === 0) { container.innerHTML = `<div class="text-center py-24 text-slate-300 font-black italic text-lg">暫時無紀錄</div>`; return; }
            container.innerHTML = f.map((item, idx) => `
                <div onclick="window.editItinerary(${item.id})" class="itin-card card">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <div class="flex items-center gap-4 mb-3">
                                <div onclick="event.stopPropagation(); window.toggleCheck(${item.id})" class="tick-box ${item.checked ? 'checked' : ''}">
                                    <i class="fa-solid fa-check text-white text-sm ${item.checked ? '' : 'hidden'}"></i>
                                </div>
                                ${!isPre && item.time ? `<span class="time-bubble">${item.time}</span>` : ''}
                            </div>
                            <div class="font-black text-lg text-slate-800 leading-tight ${item.checked ? 'completed-text' : ''}">${item.title}</div>
                            ${item.remark ? `<div class="bg-slate-50 p-4 rounded-2xl text-[12px] font-bold text-slate-500 italic mt-3">${item.remark}</div>` : ''}
                        </div>
                    </div>
                </div>`).join('');
        }

        window.toggleCheck = async (id) => {
            const item = demoItinerary.find(i => i.id === id); if (!item) return;
            await client.from('itinerary').update({ checked: !item.checked }).eq('id', id);
            fetchData();
        };

        window.showAddItineraryModal = () => {
            editingId = null; document.getElementById('modal-itinerary-title').textContent = "新增規劃";
            document.getElementById('delete-btn').classList.add('hidden');
            document.getElementById('act-date').value = selectedDate;
            document.getElementById('act-title').value = ""; document.getElementById('act-remark').value = "";
            window.toggleTimeFields(); document.getElementById('modal-itinerary').classList.remove('hidden');
        };

        window.editItinerary = (id) => {
            editingId = id; const item = demoItinerary.find(i => i.id === id);
            document.getElementById('delete-btn').classList.remove('hidden');
            document.getElementById('act-date').value = item.date;
            if(item.time) { const [h, m] = item.time.split(':'); document.getElementById('act-hour').value = h; document.getElementById('act-min').value = m; }
            document.getElementById('act-title').value = item.title;
            document.getElementById('act-remark').value = item.remark || "";
            window.toggleTimeFields(); document.getElementById('modal-itinerary').classList.remove('hidden');
        };

        window.saveItinerary = async () => {
            const title = document.getElementById('act-title').value; if(!title) return;
            const isPre = document.getElementById('act-date').value === 'Pre';
            const timeStr = isPre ? '' : `${document.getElementById('act-hour').value}:${document.getElementById('act-min').value}`;
            const data = { id: editingId || Date.now(), date: document.getElementById('act-date').value, time: timeStr, title, remark: document.getElementById('act-remark').value, checked: editingId ? (demoItinerary.find(i => i.id === editingId).checked || false) : false };
            await client.from('itinerary').upsert(data); window.hideModals(); fetchData();
        };

        window.deleteItinerary = async () => { if(confirm("確定刪除？")) { await client.from('itinerary').delete().eq('id', editingId); window.hideModals(); fetchData(); } };
        window.toggleTimeFields = () => { document.getElementById('time-selector').style.display = document.getElementById('act-date').value === 'Pre' ? 'none' : 'flex'; };

        window.quickAddExpense = () => { window.navigateTo('expenses'); window.showAddExpenseModal(); };
        window.quickAddPlan = () => { window.navigateTo('itinerary'); window.showAddItineraryModal(); };
        
        window.showAddExpenseModal = () => {
            document.getElementById('exp-desc').value = ""; document.getElementById('exp-amount').value = "";
            document.getElementById('exp-paidby').innerHTML = groupMembers.map(m => `<option value="${m}">${m}</option>`).join('');
            document.getElementById('split-members').innerHTML = groupMembers.map(m => `<label class="flex items-center gap-2.5 bg-slate-100 px-4 py-3 rounded-2xl text-[11px] font-bold"><input type="checkbox" value="${m}" checked> ${m}</label>`).join('');
            document.getElementById('modal-expense').classList.remove('hidden');
        };

        window.saveExpense = async () => {
            const amount = parseFloat(document.getElementById('exp-amount').value) || 0;
            const split = Array.from(document.querySelectorAll('#split-members input:checked')).map(cb => cb.value);
            const desc = document.getElementById('exp-desc').value;
            if(amount <= 0 || !split.length || !desc) return;
            await client.from('expenses').insert({ id: Date.now(), desc, amount, currency: document.getElementById('exp-currency').value, paid_by: document.getElementById('exp-paidby').value, split });
            window.hideModals(); fetchData();
        };

        window.showPaybackModal = () => {
            document.getElementById('payback-from').innerHTML = groupMembers.map(m => `<option value="${m}">${m}</option>`).join('');
            document.getElementById('payback-to').innerHTML = groupMembers.map(m => `<option value="${m}">${m}</option>`).join('');
            document.getElementById('payback-amount').value = "";
            document.getElementById('modal-payback').classList.remove('hidden');
        };

        window.savePayback = async () => {
            const from = document.getElementById('payback-from').value;
            const to = document.getElementById('payback-to').value;
            const amount = parseFloat(document.getElementById('payback-amount').value) || 0;
            const currency = document.getElementById('payback-currency').value;
            if(amount <= 0) return;
            const paybackData = { id: Date.now(), desc: `💸 轉帳: ${from} ➔ ${to}`, amount: amount, currency: currency, paid_by: from, split: [to] };
            await client.from('expenses').insert(paybackData);
            window.hideModals(); fetchData();
        };

        window.resetExpenseData = async () => {
            if(confirm("⚠️ 確定要「清空所有開支紀錄」嗎？\n此操作無法撤銷。")) {
                await client.from('expenses').delete().neq('id', 0);
                fetchData();
            }
        };

        function renderExpenses() {
            const container = document.getElementById('expense-list');
            const bal = {}; groupMembers.forEach(m => bal[m] = {THB: 0, HKD: 0});
            let thbTotal = 0, hkdTotal = 0;
            
            container.innerHTML = demoExpenses.map(item => {
                const isTransfer = item.desc.includes('轉帳:');
                if(!isTransfer) { if(item.currency === 'THB') thbTotal += item.amount; else hkdTotal += item.amount; }
                const share = item.amount / item.split.length;
                bal[item.paid_by][item.currency] += item.amount;
                item.split.forEach(m => bal[m][item.currency] -= share);
                
                const symbol = item.currency === 'THB' ? '฿' : '$';
                return `
                <div class="bg-white p-5 rounded-[1.8rem] card flex justify-between items-center ${isTransfer ? 'border-l-4 border-l-indigo-400' : ''}">
                    <div>
                        <div class="font-black text-slate-800 text-base">${item.desc}</div>
                        ${!isTransfer ? `<div class="text-[10px] font-black text-indigo-400 italic uppercase tracking-wider">${item.paid_by} 支付</div>` : ''}
                    </div>
                    <div class="text-right">
                        <div class="text-lg font-black italic">${symbol}${item.amount.toLocaleString()}</div>
                    </div>
                </div>`;
            }).join('');
            
            document.getElementById('total-spent-thb').textContent = thbTotal.toLocaleString();
            document.getElementById('total-spent-hkd').textContent = hkdTotal.toLocaleString();
            
            document.getElementById('settlement-list').innerHTML = groupMembers.map(m => {
                const t = bal[m].THB; const h = bal[m].HKD;
                return `
                <div class="flex justify-between items-center border-b border-slate-50 pb-4 last:border-0">
                    <span class="font-black text-gray-700 text-sm italic uppercase">${m}</span>
                    <div class="text-right">
                        <div class="font-black text-[12px] ${t>=0?'text-blue-700':'text-rose-500'}">${t.toFixed(0)} <span class="opacity-60 text-blue-900">THB</span></div>
                        <div class="font-black text-[11px] ${h>=0?'text-purple-700':'text-rose-600'}">${h.toFixed(0)} <span class="opacity-60 text-purple-900">HKD</span></div>
                    </div>
                </div>`;
            }).join('');
        }

        function updateBellLog() {
            const container = document.getElementById('update-log-container');
            let logs = [];
            demoExpenses.slice(0, 5).forEach(e => logs.push({ text: `${e.desc} (由 ${e.paid_by} 記錄)`, time: e.created_at }));
            demoItinerary.slice(0, 5).forEach(i => logs.push({ text: `行程更新: ${i.title}`, time: i.id }));
            logs.sort((a,b) => b.time - a.time);
            container.innerHTML = logs.slice(0, 5).map(l => `<div class="p-4 bg-slate-50 rounded-xl text-[11px] font-bold italic border-l-4 border-indigo-500 uppercase">${l.text}</div>`).join('') + 
            `<div class="p-4 bg-rose-50 rounded-xl text-[11px] font-bold text-rose-600 border-l-4 border-rose-400 uppercase tracking-tighter">系統更新：介面字體已放大，配色已優化。</div>`;
        }

        window.searchAndShowDirections = () => {
            const q = document.getElementById('map-search').value; if(!q) return;
            document.getElementById('map-container').innerHTML = `<div class="text-center p-12"><a href="https://www.google.com/maps/search/${encodeURIComponent(q)}" target="_blank" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black italic text-sm">喺 Google Maps 開啟位置</a></div>`;
        };

        window.triggerUpload = () => document.getElementById('file-input').click();
        window.handleFileSelect = async (e) => {
            const file = e.target.files[0]; if(file) {
                await client.from('documents').insert({ id: Date.now(), name: file.name, date: new Date().toLocaleDateString() });
                fetchData();
            }
        };

        function renderDocs() {
            document.getElementById('documents-list').innerHTML = demoDocs.map(doc => `
                <div class="bg-white p-5 rounded-[1.8rem] card flex items-center gap-4">
                    <div class="bg-indigo-50 w-10 h-10 rounded-xl flex items-center justify-center text-indigo-500 text-sm"><i class="fa-solid fa-file"></i></div>
                    <div><div class="text-sm font-black text-gray-800">${doc.name}</div><div class="text-[10px] font-bold text-slate-400 italic">${doc.date}</div></div>
                </div>`).join('');
        }

        window.factoryReset = async () => {
            if(confirm("⚠️ 警告：這將會清除所有雲端數據，確定？")) {
                await client.from('itinerary').delete().neq('id', 0);
                await client.from('expenses').delete().neq('id', 0);
                await client.from('documents').delete().neq('id', 0);
                location.reload();
            }
        };

        window.showUpdates = () => document.getElementById('modal-updates').classList.remove('hidden');
        window.hideModals = () => document.querySelectorAll('[id^=\"modal-\"]').forEach(m => m.classList.add('hidden'));
    </script>
</body>
</html>
